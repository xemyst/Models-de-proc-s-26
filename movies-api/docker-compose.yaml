      - ./migrations/02.sql:/docker-entrypoint-initdb.d/02.sql
    environment:
      - POSTGRES_USER=movies
      - POSTGRES_PASSWORD=movies
      - POSTGRES_DB=movies
    ports:
      - "5432:5432"

  movies-api-3:
