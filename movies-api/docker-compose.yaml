services:
  movies-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DB_USER=movies
      - DB_HOST=db
      - DB_NAME=movies
      - DB_PASSWORD=movies
      - DB_PORT=5432
  db:
    image: postgres:15
    container_name: movies-db
    volumes:
      - ./migrations/01.sql:/docker-entrypoint-initdb.d/01.sql
    environment:
      - POSTGRES_USER=movies
      - POSTGRES_PASSWORD=movies
      - POSTGRES_DB=movies
    ports:
      - "5431:5432"

  movies-api-2:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - .:/app
      - /app/node_modules
